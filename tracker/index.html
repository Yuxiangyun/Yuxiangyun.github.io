<body>
    <div class="container">
        <section class="hero-section">
            <h1 class="hero-headline">戒烟这一块</h1>
            <p class="hero-subheadline">🚬</p>
        </section>

        <section class="stats-section">
            <div class="stats-header">
                <h2 class="stats-title">开始时间</h2>
                <p class="stats-subtitle">自 2025年6月12日 开始</p>
            </div>

            <div class="time-display">
                <div class="time-unit">
                    <div class="time-value" id="days">0</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="hours">0</div>
                    <div class="time-label">小时</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="minutes">0</div>
                    <div class="time-label">分钟</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="seconds">0</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let previousValues = { days: 0, hours: 0, minutes: 0, seconds: 0 };

        function updateTime() {
            // 戒烟开始时间：2025年6月12日晚上0点（北京时间）
            const quitDate = new Date('2025-06-12T00:00:00+08:00');
            const now = new Date();

            // 计算时间差（毫秒）
            const timeDiff = now.getTime() - quitDate.getTime();

            if (timeDiff < 0) {
                // 如果还没到戒烟开始时间
                updateDisplay('days', 0);
                updateDisplay('hours', 0);
                updateDisplay('minutes', 0);
                updateDisplay('seconds', 0);
                return;
            }

            // 转换为天、小时、分钟、秒
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            // 更新显示
            updateDisplay('days', days);
            updateDisplay('hours', hours);
            updateDisplay('minutes', minutes);
            updateDisplay('seconds', seconds);
        }

        function updateDisplay(unit, value) {
            const element = document.getElementById(unit);
            
            // 如果值发生变化，添加动画效果
            if (previousValues[unit] !== value) {
                element.classList.add('updated');
                setTimeout(() => {
                    element.classList.remove('updated');
                }, 300);
                previousValues[unit] = value;
            }
            
            element.textContent = value;
        }

        // 立即更新一次
        updateTime();

        // 每秒更新一次
        setInterval(updateTime, 1000);
    </script>
